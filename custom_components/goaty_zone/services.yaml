get_zones:
  name: "Zonen abrufen"
  description: "Fragt alle konfigurierten Mähzonen von Goaty ab und speichert sie."
  fields: {}

mow_zone:
  name: "Zone mähen"
  description: "Startet den Mähvorgang für eine bestimmte Zone."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone (z.B. 133)"
      required: true
      example: "133"
      selector:
        text:
    zone_name:
      name: "Zonenname"
      description: "Anzeigename der Zone (für Logs und Status)"
      required: false
      example: "Weidenwiese"
      selector:
        text:

reload_zones:
  name: "Zonen neu laden"
  description: "Vergleicht aktuelle Zonen mit gespeicherten, aktualisiert bei Änderung."
  fields: {}

get_zone_config:
  name: "Zonenkonfiguration abrufen"
  description: "Liest die persistente Konfiguration einer Zone oder aller Zonen aus."
  fields:
    zone_id:
      name: "Zone ID"
      description: "Optional: eine einzelne Zone abfragen."
      required: false
      example: "133"
      selector:
        text:

set_zone_config:
  name: "Zone konfigurieren"
  description: "Setzt Mähfrequenz, Winkel und Status einer Zone."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone."
      required: true
      example: "133"
      selector:
        text:
    name:
      name: "Name"
      description: "Anzeigename der Zone."
      required: false
      example: "Weidenwiese"
      selector:
        text:
    enabled:
      name: "Aktiv"
      description: "Zone für die Automatik aktivieren oder deaktivieren."
      required: false
      selector:
        boolean:
    frequency_days:
      name: "Häufigkeit (Tage)"
      description: "Alle X Tage mähen"
      required: false
      selector:
        number:
          min: 1
          max: 30
          mode: slider
    angles:
      name: "Mähwinkel"
      description: "Liste von Winkeln in Grad (0-180), wird rotierend genutzt"
      required: false
      example: "[0, 45, 90, 135]"
      selector:
        object:
    last_mowed:
      name: "Letzter Mähzeitpunkt"
      description: "ISO-Zeitstempel des letzten Mähens."
      required: false
      example: "2026-06-11T14:30:00+00:00"
      selector:
        text:
    locked:
      name: "Gesperrt"
      description: "Manuelle Sperre der Zone."
      required: false
      selector:
        boolean:
    locked_until:
      name: "Gesperrt bis"
      description: "ISO-Zeitstempel bis zur automatischen Entsperrung."
      required: false
      example: "2026-06-12T06:00:00+00:00"
      selector:
        text:

lock_zone:
  name: "Zone sperren"
  description: "Setzt die Sperre einer Zone."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone."
      required: true
      example: "133"
      selector:
        text:
    until:
      name: "Gesperrt bis"
      description: "ISO-Datetime, z.B. 2026-06-01T00:00:00. Leer = dauerhaft."
      required: false
      selector:
        datetime:

unlock_zone:
  name: "Zone entsperren"
  description: "Hebt die Sperre einer Zone auf."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone."
      required: true
      example: "133"
      selector:
        text:

reset_zone_timer:
  name: "Mäh-Timer zurücksetzen"
  description: "Erzwingt Mähvorgang bei nächster Prüfung."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone."
      required: true
      example: "133"
      selector:
        text:

mark_zone_mowed:
  name: "Zone als gemäht markieren"
  description: "Setzt den letzten Mähzeitpunkt."
  fields:
    zone_id:
      name: "Zone ID"
      description: "ID der Zielzone."
      required: true
      example: "133"
      selector:
        text:
    advance_angle:
      name: "Winkel weiterschalten"
      required: false
      selector:
        boolean:

get_due_zones:
  name: "Fällige Zonen abfragen"
  description: "Gibt alle Zonen zurück die gemäht werden sollen."
  fields: {}

create_dashboard:
  name: "Dashboard erstellen"
  description: "Erstellt oder überschreibt das dynamische Goaty-Dashboard."
  fields:
    dashboard_title:
      name: "Dashboard-Titel"
      description: "Titel des erzeugten Dashboards."
      required: false
      example: "Goaty"
      selector:
        text:
    overwrite:
      name: "Überschreiben"
      description: "Vorhandenes Dashboard ersetzen."
      required: false
      selector:
        boolean:
