input_text:
  goaty_zones_json:
    name: "Goaty Zonen JSON"
    max: 255
    initial: "[]"
  goaty_zones_hash:
    name: "Goaty Zonen Hash"
    max: 64
    initial: ""

input_select:
  goaty_mow_zone:
    name: "Goaty Mähzone"
    options:
      - "Keine Zonen"

template:
  - sensor:
      - name: "Goaty Zones"
        unique_id: goaty_zones_alias
        state: >-
          {{ states('goaty_zone.goaty_zones') }}
        availability: >-
          {{ has_value('goaty_zone.goaty_zones') }}
        attributes:
          zones: >-
            {{ state_attr('goaty_zone.goaty_zones', 'zones') | tojson }}
          hash: >-
            {{ state_attr('goaty_zone.goaty_zones', 'hash') }}
          count: >-
            {{ state_attr('goaty_zone.goaty_zones', 'count') }}
          zone_names: >-
            {{ state_attr('goaty_zone.goaty_zones', 'zone_names') | tojson }}
          zone_ids: >-
            {{ state_attr('goaty_zone.goaty_zones', 'zone_ids') | tojson }}
